name: Build Jarvis Lite APK

on:
  push:
    branches: [main, master]
    paths:
      - 'jarvis-lite.tar.gz'
      - '.github/workflows/blank.yml'
  workflow_dispatch:

jobs:
  build:
    name: Extract & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract jarvis-lite.tar.gz
        run: |
          if [ ! -f jarvis-lite.tar.gz ]; then
            echo "❌ jarvis-lite.tar.gz not found!"
            exit 1
          fi
          mkdir -p jarvis-lite-src
          tar -xzf jarvis-lite.tar.gz -C jarvis-lite-src --strip-components=1
          echo "✅ Extracted files:"
          ls -la jarvis-lite-src/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: 25.1.8937393
          cmake-version: 3.22.1

      - name: Accept Android SDK licenses
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses <<< yes

      - name: Make gradlew executable
        working-directory: jarvis-lite-src
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: jarvis-lite-src
        run: |
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Build Release APK
        working-directory: jarvis-lite-src
        continue-on-error: true
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: List APK files
        run: |
          echo "📱 Debug APK:"
          find jarvis-lite-src -path "*/debug/*.apk" -type f
          echo ""
          echo "📦 Release APK:"
          find jarvis-lite-src -path "*/release/*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JarvisLite-debug
          path: jarvis-lite-src/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: JarvisLite-release
          path: jarvis-lite-src/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Generate Summary
        if: always()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Debug APK:**" >> $GITHUB_STEP_SUMMARY
          find jarvis-lite-src -path "*/debug/*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release APK:**" >> $GITHUB_STEP_SUMMARY
          find jarvis-lite-src -path "*/release/*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY
