name: Build Jarvis Lite APK

on:
  push:
    branches: [main, master]
    paths:
      - 'jarvis-lite.tar.gz'
      - '.github/workflows/blank.yml'
  workflow_dispatch:

jobs:
  build:
    name: Extract & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract jarvis-lite.tar.gz
        run: |
          if [ ! -f jarvis-lite.tar.gz ]; then
            echo "❌ jarvis-lite.tar.gz not found!"
            exit 1
          fi
          mkdir -p jarvis-lite-src
          tar -xzf jarvis-lite.tar.gz -C jarvis-lite-src
          echo "✅ Extracted files:"
          ls -la jarvis-lite-src/
          echo ""
          echo "📂 Directory structure:"
          find jarvis-lite-src -maxdepth 3 -type f -name "gradlew*" -o -name "build.gradle*" | head -20

      - name: Locate and fix gradlew
        run: |
          # Find gradlew in the extracted directory
          GRADLEW_PATH=$(find jarvis-lite-src -name "gradlew" -type f | head -1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "⚠️  gradlew not found. Checking directory structure..."
            find jarvis-lite-src -type f -name "*.gradle*" | head -5
            
            # If there's a nested Android project, navigate to it
            if [ -d "jarvis-lite-src/jarvis-lite" ]; then
              mv jarvis-lite-src/jarvis-lite/* jarvis-lite-src/
              rm -rf jarvis-lite-src/jarvis-lite
              echo "✅ Moved nested project to root"
            fi
          else
            echo "✅ Found gradlew at: $GRADLEW_PATH"
          fi
          
          # Make sure gradlew exists and is executable
          if [ -f jarvis-lite-src/gradlew ]; then
            chmod +x jarvis-lite-src/gradlew
            echo "✅ gradlew is now executable"
          else
            echo "❌ Still cannot find gradlew after extraction"
            ls -la jarvis-lite-src/
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: jarvis-lite-src/**/build.gradle*

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: 25.1.8937393
          cmake-version: 3.22.1

      - name: Accept Android SDK licenses
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses <<< yes

      - name: Build Debug APK
        working-directory: jarvis-lite-src
        run: |
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Build Release APK
        working-directory: jarvis-lite-src
        continue-on-error: true
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: List APK files
        run: |
          echo "📱 Debug APK:"
          find jarvis-lite-src -path "*/debug/*.apk" -type f
          echo ""
          echo "📦 Release APK:"
          find jarvis-lite-src -path "*/release/*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JarvisLite-debug
          path: jarvis-lite-src/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: JarvisLite-release
          path: jarvis-lite-src/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Generate Summary
        if: always()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Debug APK:**" >> $GITHUB_STEP_SUMMARY
          find jarvis-lite-src -path "*/debug/*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release APK:**" >> $GITHUB_STEP_SUMMARY
          find jarvis-lite-src -path "*/release/*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY
