name: Build Jarvis Lite APK

on:
  push:
    branches: [main, master]
    paths:
      - 'jarvis-lite.tar.gz'
  workflow_dispatch:  # manually trigger করা যাবে

jobs:
  build:
    name: Extract & Build APK
    runs-on: ubuntu-latest

    steps:
      # ── ১. কোড চেকআউট ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── ২. JDK 17 সেটআপ ──────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── ৩. tar.gz extract করা ────────────────────────────────────────────────
      - name: Extract jarvis-lite.tar.gz
        run: |
          mkdir -p jarvis-lite-src
          tar -xzf jarvis-lite.tar.gz -C jarvis-lite-src --strip-components=1
          echo "✅ Extracted files:"
          ls jarvis-lite-src/

      # ── ৪. Gradle Wrapper ডাউনলোড ────────────────────────────────────────────
      - name: Download Gradle Wrapper
        working-directory: jarvis-lite-src
        run: |
          gradle_version=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          echo "Gradle version: $gradle_version"
          # wrapper jar ডাউনলোড করা
          wget -q "https://services.gradle.org/distributions/gradle-${gradle_version}-bin.zip" \
            -O gradle-dist.zip
          mkdir -p gradle-dist
          unzip -q gradle-dist.zip -d gradle-dist
          echo "GRADLE_HOME=$(pwd)/gradle-dist/gradle-${gradle_version}" >> $GITHUB_ENV
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${gradle_version}/gradle/wrapper/gradle-wrapper.jar" \
            || wget -q "https://github.com/gradle/gradle/raw/v${gradle_version}/gradle/wrapper/gradle-wrapper.jar" \
               -O gradle/wrapper/gradle-wrapper.jar \
            || true

      # ── ৫. gradle-wrapper.jar ডাউনলোড (fallback) ────────────────────────────
      - name: Fetch Gradle Wrapper JAR
        working-directory: jarvis-lite-src
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar via Gradle itself..."
            gradle_version=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties \
              | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
            curl -fL \
              "https://services.gradle.org/distributions/gradle-${gradle_version}-all.zip" \
              -o /tmp/gradle-all.zip
            unzip -q /tmp/gradle-all.zip -d /tmp/gradle-all
            cp /tmp/gradle-all/gradle-${gradle_version}/lib/plugins/gradle-wrapper-*.jar \
               gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            find /tmp/gradle-all -name "gradle-wrapper.jar" | head -1 | xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar
          fi
          ls -lh gradle/wrapper/

      # ── ৬. Gradle permission ──────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: jarvis-lite-src
        run: chmod +x gradlew

      # ── ৭. Android SDK লাইসেন্স অনুমোদন ────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── ৮. Debug APK বিল্ড ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: jarvis-lite-src
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── ৯. Release APK বিল্ড (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        working-directory: jarvis-lite-src
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Pandroid.injected.signing.store.file="" \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            || echo "Release build skipped (signing not configured)"

      # ── ১০. APK ফাইল খোঁজা ───────────────────────────────────────────────────
      - name: Find APK files
        id: find_apk
        working-directory: jarvis-lite-src
        run: |
          echo "APK files found:"
          find . -name "*.apk" -type f
          debug_apk=$(find . -path "*/debug/*.apk" -name "*.apk" | head -1)
          echo "debug_apk=$debug_apk" >> $GITHUB_OUTPUT

      # ── ১১. APK আপলোড ────────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JarvisLite-debug-apk
          path: jarvis-lite-src/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK (if built)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: JarvisLite-release-apk
          path: jarvis-lite-src/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      # ── ১২. Build summary ─────────────────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Jarvis Lite Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ফাইল | অবস্থান |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          find jarvis-lite-src -name "*.apk" -type f 2>/dev/null | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            echo "| \`$(basename $apk)\` (\`$size\`) | \`$apk\` |" >> $GITHUB_STEP_SUMMARY
          done || echo "| কোনো APK পাওয়া যায়নি | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Debug APK সরাসরি ইনস্টল করা যাবে। Release APK-এর জন্য signing দরকার।" >> $GITHUB_STEP_SUMMARY
          
